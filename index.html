<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Official Invitation</title>

<style>
body{
font-family:Arial,sans-serif;
background:#ffe6f0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
text-align:center;
padding:20px;
}

.box{
background:white;
padding:30px;
border-radius:20px;
max-width:500px;
box-shadow:0 0 20px rgba(0,0,0,0.1);
}

button{
padding:15px 25px;
margin:10px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
}

#no{
position:absolute;
}
</style>
</head>

<body>

<div class="box" id="content">

<h1>🚨 OFFICIAL INVITATION 🚨</h1>

<p>Dear Sam,</p>

<p>
After careful consideration,<br>
multiple calculations,<br>
and absolutely no expert consultation...
</p>

<p>
I have decided that today at <b>7:00 PM</b>
would be significantly more fun if you were there.
</p>

<button onclick="tellMore()">😌 Tell me more</button>
<button onclick="isDate()">😂 Is this a date?</button>
<button id="no">❌ No</button>

</div>

<script>

function tellMore(){
document.getElementById("content").innerHTML = `
<h2>ADDITIONAL INFORMATION</h2>

<p>Host: Nithesh</p>

<p>
☕ Food<br>
🎵 Music<br>
😂 Laughing at my jokes<br>
(or pretending to)
</p>

<p>Fun Level: Hopefully high 😌</p>

<button onclick="finalScreen()">Continue</button>
`;
}

function isDate(){
document.getElementById("content").innerHTML = `
<h2>Error 404</h2>

<p>
Direct answer not found.
</p>

<p>
Please meet Nithesh at 7:00 PM
to unlock this information 😌
</p>

<button onclick="finalScreen()">Continue</button>
`;
}

function finalScreen(){
document.getElementById("content").innerHTML = `
<h1>🎉 RESPONSE ACCEPTED 🎉</h1>

<p>
Congratulations Sam!
</p>

<p>
You have successfully accepted
a Level 1 Side Quest.
</p>

<p>
☕ Food<br>
🎵 Music<br>
😂 Bad jokes<br>
✨ Good company
</p>

<p>
🕖 Today at 7:00 PM
</p>

<p>
Failure to attend may cause
Nithesh to become unnecessarily dramatic.
😌
</p>

<a href="https://wa.me/919353598122?text=I accept the Level 1 Side Quest 😌">
<button>Send Response ❤️</button>
</a>
`;
}

const noBtn = document.getElementById("no");

noBtn.addEventListener("mouseover",()=>{
const x=Math.random()*(window.innerWidth-150);
const y=Math.random()*(window.innerHeight-80);

noBtn.style.left=x+"px";
noBtn.style.top=y+"px";
});

</script>

</body>
</html>
